name: Ingest Past Papers

on:
  workflow_dispatch: # Manual trigger
  schedule:
    - cron: '0 2 * * *' # Daily at 2 AM UTC

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'
          
      - name: Install dependencies
        run: bun install
        
      - name: Download NSC past papers
        run: |
          curl -o papers.zip https://example.com/nsc-past-papers.zip
          unzip papers.zip -d papers/
          
      - name: Process PDFs to JSON
        run: |
          node scripts/ingest-papers.js papers/ src/content/questions/practice.json
          
      - name: Validate schema
        run: bun run lint:fix
        
      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/content/questions/practice.json
          git diff --staged --quiet || git commit -m "chore: update NSC past papers"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Notify team
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#notifications'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          
      - name: Cleanup
        run: |
          rm -rf papers/
          rm papers.zip