name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: matricmaster
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "bun"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate database client
        run: bun run db:generate

      - name: Run database migrations
        run: bun run db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/matricmaster
          POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/matricmaster

      - name: Run type check
        run: bun run typecheck
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/matricmaster
          POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/matricmaster

      - name: Run linter
        run: bun run lint

      - name: Run unit tests
        run: bun run test:unit

      - name: Run E2E tests
        run: bun run test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/matricmaster
          POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/matricmaster
          BETTER_AUTH_SECRET: test-secret-key-for-ci-testing-only-32-chars
          BETTER_AUTH_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:3000

      - name: Build project
        run: bun run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/matricmaster
          POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/matricmaster
