name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/matricmaster
      POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/matricmaster
      GEMINI_API_KEY: placeholder-for-build
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NODE_OPTIONS: --max-old-space-size=4096

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: matricmaster
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.1.2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Generate database client
        run: |
          bunx drizzle-kit generate --force
          bunx drizzle-kit generate --config=drizzle.sqlite.config.ts --force

      - name: Push database schema
        run: |
          bunx drizzle-kit push --force
          bunx drizzle-kit push --config=drizzle.sqlite.config.ts --force

      - name: Run linter
        run: bun run lint

      - name: Run unit tests with coverage
        run: bun run test:unit --coverage

      - name: Run E2E tests
        run: bun run test:e2e

      - name: Build project
        run: bun run build
